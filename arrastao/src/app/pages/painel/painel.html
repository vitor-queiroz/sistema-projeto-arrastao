<section class="dashboard">

    <h1>👋 Bem-vindo novamente, Gilmar</h1>

    <div class="search-box">
        <input type="text" placeholder="Pesquisar funcionário, CPF, setor..." [(ngModel)]="pesquisa" />


        <div class="resultado-pesquisa">

            <div class="resultado" *ngFor="let funcionario of funcionariosFiltrados()">

                <strong>{{ funcionario.nome }}</strong>

                <p>{{ funcionario.setor }}</p>

            </div>
        </div>
    </div>

    <div class="cards">

        <div class="card">
            <h2>40.000</h2>
            <p>Documentos</p>
        </div>

        <div class="card">
            <h2>350</h2>
            <p>Funcionários</p>
        </div>

        <div class="card">
            <h2>12</h2>
            <p>Setores</p>
        </div>

    </div>

    <section class="recentes">

        <h2>Últimos documentos cadastrados</h2>

        <table>

            <thead>
                <tr>
                    <th>Funcionário</th>
                    <th>Setor</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Maria Silva</td>
                    <td>Administrativo</td>
                    <td>17/07/2026</td>
                </tr>

                <tr>
                    <td>Carlos Souza</td>
                    <td>Financeiro</td>
                    <td>16/07/2026</td>
                </tr>

            </tbody>

        </table>

    </section>

</section>
