<main class="login">

    <section class="login-banner">



        <div class="banner-imagens">

            <img src="imagens/img1.jpg" alt="Criança participante do Projeto Arrastão">
            <img src="imagens/img2.jpg" alt="Criança participante do Projeto Arrastão">
            <img src="imagens/img3.jpg" alt="Criança participante do Projeto Arrastão">
            <img src="imagens/img4.jpg" alt="Criança participante do Projeto Arrastão">
            <img src="imagens/img5.jpg" alt="Criança participante do Projeto Arrastão">

        </div>


        <div class="login-sobreposicao"></div>
        <div class="marca-arrastao">

            <span class="projeto">PROJETO</span>

            <span class="arrastao">ARRASTÃO</span>
        </div>

    </section>

    <section class="login-formulario">

        <div class="login-card">

            <img class="logo" src="imagens/arrastao12.png" alt="Logo do Projeto Arrastão">

            <form class="login-form" (ngSubmit)="entrar()">
                <div class="campo">


                </div>

                <div class="campo">
                    <label for="usuario">E-mail</label>

                    <input id="email" 
                    type="email" 
                    placeholder="Digite seu e-mail" 
                    autocomplete="email"
                    [(ngModel)]="email"
                    name="email">
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>

                    <input id="senha" 
                    type="password" 
                    placeholder="Digite sua senha" 
                    autocomplete="current-password"
                    [(ngModel)]="senha"
                    name="senha"> <!--O atributo ""name""" é obrigatório quando usamos [(ngModel)] dentro de um formulário.-->
                </div>

                <button class="botao-entrar" type="submit">
                    Entrar
                </button>

            </form>

        </div>

    </section>

</main>
