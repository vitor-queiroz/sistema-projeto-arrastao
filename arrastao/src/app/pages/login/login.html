<main class="login">

    <section class="login__banner">

        <div class="login__banner-content">
            <h1>Bem-vindo!</h1>
            <p>Gerencie documentos de forma rápida e segura.</p>
        </div>

    </section>

    <section class="login__formulario">

        <div class="login-card">

            <img 
            class="logo"
            src="assets/logo/logoarrastao.png" 
            alt="Logo do Projeto Arrastão">

            <form class="login-form">

             <div class="campo">   
               <label for="usuario">Usuário</label>     

                <input 
                id="usuario"
                type="text" 
                placeholder="Digite seu usuário"
                autocomplete="username">
             </div>

             <div class="campo">
                <label for="senha">Senha</label>

                <input
                id="senha" 
                type="password"
                placeholder="Digite sua senha"
                autocomplete="current-password">
             </div>   

                <button class="botao-entrar" type="submit">
                    Entrar
                </button>

            </form>

        </div>

    </section>

</main>
